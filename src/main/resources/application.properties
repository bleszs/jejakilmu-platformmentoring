# ==============================================================
# PLATFORM MENTORING AKADEMIK - Konfigurasi Aplikasi
# ==============================================================
# Deskripsi: File konfigurasi utama Spring Boot untuk sistem
#            mentoring akademik terintegrasi (Sekolah & Kampus).
# ==============================================================

spring.application.name=Platform Mentoring Akademik

# --- Konfigurasi Server ---
# Railway menyuntikkan port lewat env var $PORT secara otomatis.
# Fallback ke 8080 saat development lokal.
server.port=${PORT:8080}

# --- Database (H2 default lokal — override oleh profil 'railway') ---
spring.datasource.url=jdbc:h2:file:./data/mentoring_akademik_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=mentorpbo2024

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=true

# DevTools: matikan di Railway (tidak relevan di cloud)
spring.devtools.add-properties=false
spring.devtools.restart.enabled=false

# --- Konfigurasi Thymeleaf ---
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
# Aktifkan cache di production untuk performa (nonaktifkan saat development lokal)
spring.thymeleaf.cache=true

# --- Konfigurasi Logging ---
# INFO lebih tepat untuk production; DEBUG terlalu verbose di Railway logs
logging.level.com.mentorpbo=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

