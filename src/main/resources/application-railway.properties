# ============================================================
# PROFIL RAILWAY — override application.properties
# Aktif saat Dockerfile ENTRYPOINT set -Dspring.profiles.active=railway
# ============================================================

# Supabase PostgreSQL — Transaction Pooler (port 6543, IPv4)
# prepareThreshold=0 wajib untuk Transaction Pooler (nonaktifkan prepared statements)
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.zkuxzgpaocdzruldzdqj
spring.datasource.password=onicudil11
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — pool kecil untuk Railway free tier
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-test-query=SELECT 1

# H2 Console nonaktif di production
spring.h2.console.enabled=false

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# ==============================================================
# PROXY HEADERS — wajib agar {baseUrl} OAuth2 resolve ke https://
# Railway menggunakan reverse proxy; tanpa ini redirect_uri
# akan menjadi http:// dan Google menolak.
# ==============================================================
server.forward-headers-strategy=framework

# ==============================================================
# UPLOAD FILE — fix HTTP 413 Payload Too Large
# Register pengawas memungkinkan upload dokumen verifikasi.
# Default Spring Boot 1MB terlalu kecil untuk dokumen PDF/gambar.
# ==============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Tomcat: izinkan form POST besar (-1 = unlimited, dikontrol oleh multipart settings di atas)
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1
